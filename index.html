<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Genismo — Filosofia, Genes e Felicidade | Jocax</title>
<meta name="description" content="Genismo: filosofia ateísta baseada em psicologia evolutiva, criada por João Carlos Holland de Barcellos (Jocax). Arquivo completo de artigos sobre genética, memética, lógica, meta-ética-científica e religiões.">
<meta name="keywords" content="Genismo, Jocax, Filosofia, Psicologia Evolutiva, Genética, Memética, Meta-Ética, Ateísmo, Barcellos">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#6699FF;          /* azul original do site de 2005 */
  --deep:#1c3a75;
  --deep2:#2a52a8;
  --bg:#f3f7ff;
  --card:#ffffff;
  --ink:#1a2740;
  --muted:#5a6b8c;
  --cream:#FFF3C4;          /* creme dos textos do site clássico */
  --line:#d9e4f7;
  --radius:14px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);
  font:16px/1.6 "Segoe UI",system-ui,-apple-system,Arial,sans-serif}
a{color:var(--deep2);text-decoration:none}
a:hover{text-decoration:underline}

/* ---------- header ---------- */
header{
  background:linear-gradient(150deg,var(--deep) 0%,var(--deep2) 55%,var(--brand) 130%);
  color:#fff;padding:36px 20px 26px;position:relative;overflow:hidden}
header .helix{position:absolute;right:-30px;top:-40px;opacity:.14;pointer-events:none}
.wrap{max-width:1060px;margin:0 auto;position:relative}
h1{font-family:"Spectral",Georgia,serif;font-weight:700;
  font-size:clamp(2rem,5vw,3rem);margin:0;letter-spacing:.5px}
h1 .ver{display:inline-block;vertical-align:middle;margin-left:12px;
  font:600 .72rem/1 "Segoe UI",sans-serif;background:var(--cream);color:var(--deep);
  border-radius:999px;padding:5px 11px;letter-spacing:.6px}
.tag{margin:6px 0 0;font-size:1.02rem;opacity:.92}
.quote{font-family:"Spectral",Georgia,serif;font-style:italic;
  color:var(--cream);margin:16px 0 0;font-size:1.08rem}
.quote span{opacity:.8;font-style:normal;font-size:.9rem}

/* ---------- busca ---------- */
.searchbar{max-width:1060px;margin:22px auto 0;display:flex;gap:10px}
.searchbar input{flex:1;font-size:1.05rem;padding:13px 18px;border:0;
  border-radius:var(--radius);outline:3px solid transparent;transition:outline .15s}
.searchbar input:focus{outline-color:var(--cream)}
.searchbar button{background:var(--cream);color:var(--deep);border:0;font-weight:700;
  padding:0 22px;border-radius:var(--radius);cursor:pointer;font-size:1rem}
.searchbar button:hover{filter:brightness(1.05)}
.searchmeta{max-width:1060px;margin:8px auto 0;font-size:.85rem;opacity:.85}

/* ---------- chips de categoria ---------- */
nav.chips{max-width:1060px;margin:22px auto 0;padding:0 20px;
  display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--card);border:1px solid var(--line);color:var(--deep2);
  border-radius:999px;padding:7px 15px;font-size:.88rem;cursor:pointer;
  transition:all .15s}
.chip:hover,.chip.active{background:var(--brand);border-color:var(--brand);color:#fff}

/* ---------- conteúdo ---------- */
main{max-width:1060px;margin:26px auto 40px;padding:0 20px}
#results{display:none;margin-bottom:30px}
.result{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--brand);
  border-radius:var(--radius);padding:14px 18px;margin-bottom:12px}
.result h3{margin:0 0 4px;font-size:1.05rem}
.result .cat{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.result p{margin:6px 0 0;font-size:.92rem;color:var(--ink)}
mark{background:var(--cream);border-radius:3px;padding:0 2px}

.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
section.catcard{background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.catcard h2{margin:0;background:linear-gradient(120deg,var(--deep2),var(--brand));
  color:#fff;font-family:"Spectral",Georgia,serif;font-weight:600;
  font-size:1.15rem;padding:12px 18px}
.catcard h2 small{float:right;font:600 .72rem/1.7 "Segoe UI",sans-serif;
  background:rgba(255,255,255,.22);border-radius:999px;padding:3px 10px}
.catcard ul{list-style:none;margin:0;padding:10px 18px 14px;overflow-y:auto;
  max-height:330px;flex:1}
.catcard li{padding:5px 0;border-bottom:1px dashed var(--line);font-size:.93rem}
.catcard li:last-child{border-bottom:0}
.catcard li .sz{color:var(--muted);font-size:.78rem;margin-left:6px}

/* ---------- footer ---------- */
footer{background:var(--deep);color:#cdd9f2;padding:26px 20px;font-size:.9rem}
footer .wrap{display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between}
footer a{color:var(--cream)}
.counter img{vertical-align:middle;border-radius:4px}
#google_translate_element{min-height:30px}
@media(max-width:640px){
  .searchbar{flex-direction:column;padding:0 20px}
  .searchbar{margin-left:0;margin-right:0}
}
</style>
</head>
<body>

<header>
  <svg class="helix" width="420" height="320" viewBox="0 0 420 320" aria-hidden="true">
    <g stroke="#fff" stroke-width="3" fill="none">
      <path d="M60 0 C 160 60, -40 120, 60 180 C 160 240, -40 300, 60 360"/>
      <path d="M160 0 C 60 60, 260 120, 160 180 C 60 240, 260 300, 160 360"/>
      <line x1="72" y1="28" x2="148" y2="28"/><line x1="98" y1="62" x2="122" y2="62"/>
      <line x1="72" y1="152" x2="148" y2="152"/><line x1="98" y1="118" x2="122" y2="118"/>
      <line x1="72" y1="208" x2="148" y2="208"/><line x1="98" y1="242" x2="122" y2="242"/>
      <line x1="72" y1="332" x2="148" y2="332"/><line x1="98" y1="298" x2="122" y2="298"/>
    </g>
  </svg>
  <div class="wrap">
    <h1>Genismo <span class="ver">v1.0.2</span></h1>
    <p class="tag">Filosofia ateísta baseada em psicologia evolutiva — por João Carlos Holland de Barcellos (Jocax)</p>
    <p class="quote">“Nossos genes são nosso bem mais precioso.” <span>— Jocax</span></p>
  </div>
  <form class="searchbar wrap" id="sform" onsubmit="return false">
    <input id="q" type="search" placeholder="Pesquisar em todos os artigos e PDFs… (insensível a acentos)"
           autocomplete="off" aria-label="Pesquisar no site">
    <button id="sbtn" type="submit">Pesquisar</button>
  </form>
  <div class="searchmeta wrap" id="smeta"></div>
</header>

<nav class="chips" id="chips" aria-label="Categorias"></nav>

<main>
  <div id="results" aria-live="polite"></div>
  <div class="catgrid" id="catgrid"></div>
</main>

<footer>
  <div class="wrap">
    <div>
      Genismo © 2005–2026 · Jocax ·
      <a href="index_classico.htm">site clássico</a> ·
      <a href="busca.html">página de busca</a> ·
      <a href="autores.htm">autores</a> ·
      <a href="mailto:genismo@genismo.com">e-mail</a>
    </div>
    <div class="counter">
      <img src="https://hits.sh/jocaxx.github.io/genismo.svg?label=visitas&color=6699ff&labelColor=1c3a75" alt="contador de visitas">
    </div>
    <div id="google_translate_element"></div>
  </div>
</footer>

<script>
/* ============================= dados ================================== */
let ITEMS = null, SEARCH = null, searchLoading = null;

fetch('items.json?v=102').then(r=>{if(!r.ok)throw 0;return r.json();}).then(d=>{ITEMS=d;renderCats(d);})
  .catch(()=>{document.getElementById('catgrid').innerHTML=
    '<p style="grid-column:1/-1;background:#fff3f3;border:1px solid #e8b4b4;border-radius:14px;padding:16px">'+
    '<strong>Não foi possível carregar a lista de artigos.</strong><br>'+
    'Se você abriu este arquivo direto do seu computador (endereço file:///), '+
    'isso é normal: o navegador bloqueia o carregamento local dos dados. '+
    'Teste no site publicado: <a href="https://jocaxx.github.io/genismo/">jocaxx.github.io/genismo</a></p>';});

function loadSearchIndex(){
  if (SEARCH) return Promise.resolve(SEARCH);
  if (!searchLoading){
    document.getElementById('smeta').textContent = 'Carregando índice de busca…';
    searchLoading = fetch('search-index.json?v=102')
      .then(r=>{
        if(!r.ok) throw new Error('HTTP '+r.status+' ao baixar search-index.json');
        return r.json();
      })
      .then(idx=>{
        if(!Array.isArray(idx)) throw new Error('search-index.json não é uma lista (formato inesperado)');
        idx.forEach(e=>{ e.nt = norm(e.text||''); e.ntitle = norm(e.title||''); });
        SEARCH = idx;
        document.getElementById('smeta').textContent = '';
        return idx;
      })
      .catch(err=>{
        searchLoading = null;
        document.getElementById('smeta').textContent =
          'ERRO no índice de busca: ' + (err && err.message ? err.message :
          'falha ao baixar/ler. Se abriu o arquivo localmente (file:///), teste no site publicado.');
        throw err;
      });
  }
  return searchLoading;
}

/* remove acentos + minúsculas */
function norm(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* realça os termos no texto original, mesmo quando acentuados
   (funciona porque norm() preserva o nº de caracteres em textos latinos) */
function highlight(raw, terms){
  const n = norm(raw);
  const marks = [];                       // intervalos [ini, fim)
  for (const t of terms){
    let i = 0;
    while ((i = n.indexOf(t, i)) >= 0){ marks.push([i, i+t.length]); i += t.length; }
  }
  if (!marks.length) return esc(raw);
  marks.sort((a,b)=>a[0]-b[0]);
  let out = '', cur = 0;
  for (const [a,b] of marks){
    if (a < cur) continue;                // sobreposição
    out += esc(raw.slice(cur,a)) + '<mark>' + esc(raw.slice(a,b)) + '</mark>';
    cur = b;
  }
  return out + esc(raw.slice(cur));
}

/* ======================= listagem por categoria ======================= */
function renderCats(data){
  const grid = document.getElementById('catgrid');
  const chips = document.getElementById('chips');
  chips.innerHTML = '<button class="chip active" data-cat="*">Todas</button>' +
    data.categories.map(c=>`<button class="chip" data-cat="${c.id}">${c.name}</button>`).join('');
  chips.onclick = e=>{
    const b = e.target.closest('.chip'); if(!b) return;
    chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    const cat = b.dataset.cat;
    grid.querySelectorAll('.catcard').forEach(s=>{
      s.style.display = (cat==='*' || s.dataset.cat===cat) ? '' : 'none';
    });
  };
  grid.innerHTML = data.categories.map(c=>{
    const arts = data.items.filter(i=>i.cat===c.id);
    if(!arts.length) return '';
    return `<section class="catcard" data-cat="${c.id}">
      <h2>${c.name}<small>${arts.length}</small></h2>
      <ul>${arts.map(a=>`<li><a href="${encodeURI(a.href)}">${esc(a.title)}</a>${a.size?`<span class="sz">${a.size}</span>`:''}</li>`).join('')}</ul>
    </section>`;
  }).join('');
}

/* ============================== busca ================================= */
const qEl = document.getElementById('q');
let timer;
qEl.addEventListener('input', ()=>{ clearTimeout(timer); timer=setTimeout(doSearch,280); });
document.getElementById('sform').addEventListener('submit', doSearch);

function doSearch(){
  const q = norm(qEl.value.trim());
  const box = document.getElementById('results');
  const grid = document.getElementById('catgrid');
  const chips = document.getElementById('chips');
  if (q.length < 2){ box.style.display='none'; grid.style.display=''; chips.style.display=''; return; }
  box.innerHTML = '<p>Buscando… (na primeira busca o índice de 3,7 MB é baixado; pode levar alguns segundos)</p>';
  box.style.display=''; grid.style.display='none'; chips.style.display='none';
  loadSearchIndex().then(idx=>{
    const terms = q.split(/\s+/).filter(t=>t.length>1);
    const hits = [];
    for (const e of idx){
      let score = 0, pos = -1;
      let ok = true;
      for (const t of terms){
        const inTitle = e.ntitle.indexOf(t);
        const inText  = e.nt.indexOf(t);
        if (inTitle < 0 && inText < 0){ ok=false; break; }
        if (inTitle >= 0) score += 10;
        if (inText  >= 0){ score += 1; if(pos<0) pos = inText; }
      }
      if (ok) hits.push({e, score, pos});
    }
    hits.sort((a,b)=>b.score-a.score);
    const top = hits.slice(0,60);
    box.innerHTML = `<p><strong>${hits.length}</strong> resultado(s) para “${esc(qEl.value.trim())}”</p>` +
      top.map(h=>{
        let snip = '';
        if (h.pos >= 0 && h.e.text){
          const start = Math.max(0, h.pos-90);
          const raw = h.e.text.slice(start, h.pos+170);
          snip = (start>0?'…':'') + highlight(raw, terms) + '…';
        }
        return `<div class="result">
          <div class="cat">${esc(h.e.cat)}</div>
          <h3><a href="${encodeURI(h.e.href)}">${esc(h.e.title)}</a></h3>
          ${snip?`<p>${snip}</p>`:''}</div>`;
      }).join('');
    box.style.display=''; grid.style.display='none'; chips.style.display='none';
  }).catch(err=>{
    box.innerHTML = '<p style="background:#fff3f3;border:1px solid #e8b4b4;'+
      'border-radius:14px;padding:16px;color:#7a1f1f"><strong>Erro na busca:</strong> '+
      esc(err && err.message ? err.message : 'não foi possível carregar o índice de busca.')+
      '<br>Tente recarregar a página (Ctrl+F5). Se persistir, verifique se '+
      '<a href="search-index.json">search-index.json</a> abre no navegador.</p>';
    box.style.display='';
  });
}

/* ======================= Google Translate ============================= */
function googleTranslateElementInit(){
  new google.translate.TranslateElement(
    {pageLanguage:'pt', layout:google.translate.TranslateElement.InlineLayout.SIMPLE},
    'google_translate_element');
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" defer></script>
</body>
